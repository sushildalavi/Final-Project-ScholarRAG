name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: scholarrag
          POSTGRES_PASSWORD: scholarrag
          POSTGRES_DB: scholarrag_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scholarrag"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Initialize database
        run: |
          PGPASSWORD=scholarrag psql -h 127.0.0.1 -U scholarrag -d scholarrag_db -f db/init.sql

      - name: Lint (ruff)
        run: ruff check backend/ utils/ scripts/ --select E,F,W

      - name: Run tests
        env:
          DATABASE_URL: postgresql://scholarrag:scholarrag@127.0.0.1:5432/scholarrag_db
          EMBEDDING_PROVIDER: ollama
          OLLAMA_BASE_URL: http://127.0.0.1:11434
        run: pytest backend/tests/ -x -q

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
